services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  executor:
    build:
      context: ./executor-rust
      dockerfile: Dockerfile
    ports:
      - "7777:7777"
    environment:
      - HOME=${HOME:-/tmp}
      - HOST=0.0.0.0
      - PORT=7777
    volumes:
      - ${HOME:-/tmp}:${HOME:-/tmp}:rw
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    expose:
      - "8080"
    volumes:
      - searxng_data:/etc/searxng
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf -o /dev/null 'http://127.0.0.1:8080/search?q=test&format=json' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - SEMANTIC_CACHE_DB=/app/data/semantic_cache.db
      - AGENT_BROWSER_WORKDIR=/tmp/agent_browser
      - EXECUTOR_URL=http://executor:7777
      - SEARXNG_URL=http://searxng:8080
      - SEARXNG_TIMEOUT_SECONDS=10
    depends_on:
      redis:
        condition: service_healthy
      executor:
        condition: service_started
    volumes:
      - ./.env:/app/.env
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    env_file:
      - .env
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  backend_data:
  searxng_data:
